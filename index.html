```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RMS Knockout</title>

<style>

body{
background:#000018;
font-family:Arial;
text-align:center;
color:white;
padding:20px;
}

h1{
color:#00ffff;
text-shadow:0 0 10px #ff00ff;
margin-bottom:20px;
}

#grid{
display:grid;
grid-template-columns:repeat(4,140px);
gap:15px;
width:620px;
margin:auto;
margin-bottom:25px;
}

.boxWrapper{
position:relative;
}

.boxNum{
position:absolute;
top:4px;
left:6px;
font-size:13px;
color:#00ffff;
font-weight:bold;
}

.box{
width:140px;
height:60px;
border-radius:10px;
border:2px solid #00ffff;
background:#001a33;
color:white;
font-size:16px;
text-align:center;
}

#playArea{
width:620px;
height:420px;
margin:auto;
position:relative;
border:2px solid #00ffff;
border-radius:12px;
background:linear-gradient(135deg,#001a33,#000010);
overflow:hidden;
}

.nameTag{
position:absolute;
background:white;
color:#001a33;
font-weight:bold;
padding:6px 10px;
border-radius:8px;
font-size:14px;
}

button{
margin:10px;
padding:10px 20px;
border-radius:8px;
border:none;
background:#00ffff;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff00ff;
color:white;
}

#winner{
font-size:26px;
margin-top:20px;
color:#ff00ff;
text-shadow:0 0 10px #00ffff;
}

</style>

</head>

<body>

<h1>RMS Knockout</h1>

<div id="grid"></div>

<button id="startBtn">Start Game</button>
<button onclick="location.reload()">Back To Start</button>

<div id="playArea"></div>
<div id="winner"></div>

<script>

const grid=document.getElementById("grid")
const playArea=document.getElementById("playArea")

// create 16 boxes
for(let i=1;i<=16;i++){

let wrap=document.createElement("div")
wrap.className="boxWrapper"

wrap.innerHTML=`
<span class="boxNum">${i}</span>
<input class="box" placeholder="Name">
`

grid.appendChild(wrap)

}

const boxes=document.querySelectorAll(".box")

let canvas
let ctx

let logoX
let logoY

let dx
let dy

const logoWidth=80
const logoHeight=50

let nameTags=[]

function randomDirection(){

const speed=2.5

const dirs=[
[speed,speed*1.3],
[-speed,speed*1.3],
[speed,-speed*1.3],
[-speed,-speed*1.3]
]

return dirs[Math.floor(Math.random()*dirs.length)]

}

function startGame(){

playArea.innerHTML=""

canvas=document.createElement("canvas")
canvas.width=playArea.clientWidth
canvas.height=playArea.clientHeight

playArea.appendChild(canvas)

ctx=canvas.getContext("2d")

logoX=canvas.width/2
logoY=canvas.height/2

let dir=randomDirection()

dx=dir[0]
dy=dir[1]

nameTags=[]

// place names in chosen grid zone
boxes.forEach((box,index)=>{

if(box.value.trim()!=""){

let tag=document.createElement("div")
tag.className="nameTag"
tag.innerText=box.value

let col=index%4
let row=Math.floor(index/4)

let cellW=canvas.width/4
let cellH=canvas.height/4

let jitterX=Math.random()*50
let jitterY=Math.random()*30

tag.style.left=(col*cellW+20+jitterX)+"px"
tag.style.top=(row*cellH+20+jitterY)+"px"

playArea.appendChild(tag)

nameTags.push(tag)

}

})

grid.style.display="none"
document.getElementById("startBtn").style.display="none"

animate()

}

function drawLogo(){

ctx.fillStyle="rgba(0,0,20,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

let grad=ctx.createRadialGradient(
logoX+40,logoY+25,5,
logoX+40,logoY+25,40
)

grad.addColorStop(0,"#00ffff")
grad.addColorStop(1,"#ff00ff")

ctx.fillStyle=grad

ctx.beginPath()
ctx.ellipse(logoX+40,logoY+25,40,25,0,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="#000020"
ctx.font="bold 20px Arial"
ctx.textAlign="center"
ctx.textBaseline="middle"

ctx.fillText("RMS",logoX+40,logoY+25)

}

function explosion(x,y){

for(let i=0;i<12;i++){

let spark=document.createElement("div")

spark.style.position="absolute"
spark.style.width="6px"
spark.style.height="6px"

spark.style.background=["#00ffff","#ff00ff","#ffffff"][Math.floor(Math.random()*3)]

spark.style.left=x+"px"
spark.style.top=y+"px"
spark.style.borderRadius="50%"

playArea.appendChild(spark)

let angle=Math.random()*Math.PI*2
let speed=3+Math.random()*3

let vx=Math.cos(angle)*speed
let vy=Math.sin(angle)*speed

let life=30

function move(){

spark.style.left=parseFloat(spark.style.left)+vx+"px"
spark.style.top=parseFloat(spark.style.top)+vy+"px"

life--

if(life>0) requestAnimationFrame(move)
else spark.remove()

}

move()

}

}

function animate(){

logoX+=dx
logoY+=dy

// bounce off walls
if(logoX<=0||logoX+logoWidth>=canvas.width){

dx*=-1
dy+=(Math.random()-0.5)*0.5

}

if(logoY<=0||logoY+logoHeight>=canvas.height){

dy*=-1
dx+=(Math.random()-0.5)*0.5

}

// collision detection
nameTags.forEach(tag=>{

if(!tag.parentElement)return

let x=parseFloat(tag.style.left)
let y=parseFloat(tag.style.top)
let w=tag.offsetWidth
let h=tag.offsetHeight

if(
logoX<x+w &&
logoX+logoWidth>x &&
logoY<y+h &&
logoY+logoHeight>y
){

explosion(x,y)
tag.remove()

}

})

drawLogo()

let remaining=nameTags.filter(t=>t.parentElement)

if(remaining.length===1){

document.getElementById("winner").innerText=
"🏆 Winner: "+remaining[0].innerText

return

}

requestAnimationFrame(animate)

}

document.getElementById("startBtn").onclick=startGame

</script>

</body>
</html>
