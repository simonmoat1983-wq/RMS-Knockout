<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RMS Knockout</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: #010b1a; /* very dark blue almost black */
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}
h1 {
  margin: 20px;
  color: #00ffff; /* cyan title */
}
#playArea {
  position: relative;
  margin: 20px auto;
  width: 500px;
  height: 500px;
  background: #001a33; /* darker blue */
  border: 3px solid #00ffff;
  border-radius: 15px;
  overflow: hidden;
}
.nameTag {
  position: absolute;
  padding: 5px 10px;
  background: white;
  color: #001a33;
  font-weight: bold;
  border-radius: 8px;
  transition: transform 0.2s;
}
#instructions {
  margin-bottom: 15px;
}
#winner {
  font-size: 24px;
  margin-top: 20px;
  color: #ff00ff; /* pink winner */
}
button {
  padding: 10px 20px;
  margin: 5px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #00ffff;
  color: #001a33;
}
</style>
</head>
<body>

<h1>RMS Knockout</h1>
<div id="instructions">Enter names in the boxes below and then press START!</div>
<div id="grid" style="display:grid; grid-template-columns: repeat(4, 100px); grid-gap: 10px; width: 450px; margin: 0 auto;">
  <!-- 16 input boxes -->
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
  <input placeholder="Name" class="box">
</div>
<button id="startBtn">START</button>

<div id="playArea"></div>
<div id="winner"></div>

<script>
const playArea = document.getElementById('playArea');
const boxes = Array.from(document.querySelectorAll('.box'));
let namesInBox = [];
let nameTags = [];
let logoX = 50, logoY = 50;
let dx = (Math.random() * 2 + 1) * (Math.random() > 0.5 ? 1 : -1);
let dy = (Math.random() * 2 + 1) * (Math.random() > 0.5 ? 1 : -1);
let logoWidth = 60, logoHeight = 40;
let logoInterval;
let lastHit = null;

// Draw logo function
function drawLogo(ctx, x, y) {
  ctx.clearRect(0, 0, playArea.clientWidth, playArea.clientHeight);
  // draw all remaining names
  nameTags.forEach(tag => {
    if(tag.parentElement) {
      tag.style.transform = `translate(0,0)`; // ensure visible
    }
  });
  // draw oval logo
  ctx.save();
  ctx.fillStyle = '#ff00ff'; // pink
  ctx.beginPath();
  ctx.ellipse(x + logoWidth/2, y + logoHeight/2, logoWidth/2, logoHeight/2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#001a33';
  ctx.font = 'bold 16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('RMS', x + logoWidth/2, y + logoHeight/2);
  ctx.restore();
}

// Initialize canvas inside playArea
const canvas = document.createElement('canvas');
canvas.width = playArea.clientWidth;
canvas.height = playArea.clientHeight;
playArea.appendChild(canvas);
const ctx = canvas.getContext('2d');

function animateLogo() {
  logoX += dx;
  logoY += dy;

  // Bounce off walls
  if(logoX <=0 || logoX+logoWidth >= playArea.clientWidth) dx *= -1;
  if(logoY <=0 || logoY+logoHeight >= playArea.clientHeight) dy *= -1;

  // Random direction change
  if(Math.random() < 0.01) { dx *= -1; dy *= -1; }

  // Check collisions with names
  nameTags.forEach((tag, idx) => {
    if(!tag.parentElement) return; // already removed
    const tagX = parseFloat(tag.style.left);
    const tagY = parseFloat(tag.style.top);
    const tagW = tag.offsetWidth;
    const tagH = tag.offsetHeight;

    if(logoX < tagX + tagW && logoX + logoWidth > tagX &&
       logoY < tagY + tagH && logoY + logoHeight > tagY) {
         // Hit detected
         tag.remove();
         lastHit = idx;
    }
  });

  drawLogo(ctx, logoX, logoY);

  // Check for winner
  if(nameTags.filter(tag => tag.parentElement).length === 1) {
    const winnerTag = nameTags.find(tag => tag.parentElement);
    document.getElementById('winner').innerText = "🏆 Winner: " + winnerTag.innerText;
    clearInterval(logoInterval);
    return;
  }

  requestAnimationFrame(animateLogo);
}

// Start game
document.getElementById('startBtn').addEventListener('click', () => {
  namesInBox = boxes.map(b => b.value).filter(v=>v.trim() !== "");
  if(namesInBox.length === 0) { alert("Enter at least one name!"); return; }

  // hide grid
  document.getElementById('grid').style.display = 'none';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('instructions').style.display = 'none';

  // place names in playArea
  namesInBox.forEach((name, i) => {
    const tag = document.createElement('div');
    tag.classList.add('nameTag');
    tag.style.left = (20 + (i%4)*100) + 'px';
    tag.style.top = (20 + Math.floor(i/4)*100) + 'px';
    tag.innerText = name;
    playArea.appendChild(tag);
    nameTags.push(tag);
  });

  animateLogo();
});
</script>

</body>
</html>
